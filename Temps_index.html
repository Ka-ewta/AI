<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Prototype - Work/Private</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --line: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --blue: #2563eb;
    }
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      background: linear-gradient(135deg, #0b1220, #1e293b);
    }
    .app {
      width: min(860px, 100%);
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 1.35rem;
    }
    .tabs,
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid #374151;
      background: #1f2937;
      color: #cbd5e1;
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
    }
    .chip.active {
      border-color: #60a5fa;
      color: #93c5fd;
      background: #0b1220;
    }
    .input-grid {
      margin-top: 14px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1.4fr 0.9fr 0.8fr auto;
    }
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #0b1220;
      color: var(--text);
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      color: white;
      background: var(--blue);
    }
    .toolbar {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
    }
    ul {
      list-style: none;
      margin: 12px 0 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }
    li {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #0b1220;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: center;
    }
    li.done .title {
      text-decoration: line-through;
      color: var(--muted);
    }
    .title {
      font-weight: 500;
    }
    .meta {
      color: var(--muted);
      font-size: 0.85rem;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #475569;
      color: #cbd5e1;
      text-transform: capitalize;
    }
    .badge.work {
      border-color: #1d4ed8;
      color: #93c5fd;
    }
    .badge.private {
      border-color: #15803d;
      color: #86efac;
    }
    .danger {
      border: 1px solid #7f1d1d;
      background: transparent;
      color: #fecaca;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px 0 6px;
    }
    @media (max-width: 760px) {
      .input-grid {
        grid-template-columns: 1fr 1fr;
      }
      .input-grid .btn {
        grid-column: 1 / -1;
      }
      li {
        grid-template-columns: auto 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Todo (Prototype)</h1>

    <div class="tabs" id="tabs">
      <button class="chip active" data-tab="work">Work</button>
      <button class="chip" data-tab="private">Private</button>
      <button class="chip" data-tab="all">All</button>
    </div>

    <div class="input-grid">
      <input id="titleInput" type="text" placeholder="เพิ่มรายการ..." />
      <input id="deadlineInput" type="date" />
      <select id="typeInput">
        <option value="work">Work</option>
        <option value="private">Private</option>
      </select>
      <button class="btn" id="addBtn">เพิ่ม</button>
    </div>

    <div class="toolbar">
      <div id="countText">0 งานค้าง</div>
      <div class="filters" id="filters">
        <button class="chip active" data-filter="all">ทั้งหมด</button>
        <button class="chip" data-filter="active">ยังไม่เสร็จ</button>
        <button class="chip" data-filter="done">เสร็จแล้ว</button>
      </div>
    </div>

    <ul id="list"></ul>
    <div id="empty" class="empty">ยังไม่มีรายการ</div>
  </div>

  <script>
    const titleInput = document.getElementById("titleInput");
    const deadlineInput = document.getElementById("deadlineInput");
    const typeInput = document.getElementById("typeInput");
    const addBtn = document.getElementById("addBtn");
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");
    const countText = document.getElementById("countText");

    const tabButtons = [...document.querySelectorAll("#tabs .chip")];
    const filterButtons = [...document.querySelectorAll("#filters .chip")];

    let selectedTab = "work";
    let selectedFilter = "all";
    let todos = [];

    function fmtDate(value) {
      if (!value) return "ไม่กำหนด deadline";
      const d = new Date(value + "T00:00:00");
      return "กำหนดส่ง: " + d.toLocaleDateString("th-TH");
    }

    function isOverdue(todo) {
      if (!todo.deadline || todo.done) return false;
      const today = new Date();
      const dd = new Date(todo.deadline + "T00:00:00");
      today.setHours(0, 0, 0, 0);
      return dd < today;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, function (s) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[s];
      });
    }

    function visibleTodos() {
      return todos.filter(function (t) {
        if (selectedTab !== "all" && t.type !== selectedTab) return false;
        if (selectedFilter === "active" && t.done) return false;
        if (selectedFilter === "done" && !t.done) return false;
        return true;
      });
    }

    function render() {
      const data = visibleTodos();
      list.innerHTML = data
        .map(function (t) {
          const overdue = isOverdue(t);
          return (
            '<li class="' +
            (t.done ? "done" : "") +
            '">' +
            '<input type="checkbox" data-action="toggle" data-id="' +
            t.id +
            '" ' +
            (t.done ? "checked" : "") +
            " />" +
            "<div>" +
            '<div class="title">' +
            escapeHtml(t.title) +
            "</div>" +
            '<div class="meta" style="' +
            (overdue ? "color:#fca5a5" : "") +
            '">' +
            fmtDate(t.deadline) +
            (overdue ? " (เกินกำหนด)" : "") +
            "</div>" +
            "</div>" +
            '<span class="badge ' +
            t.type +
            '">' +
            t.type +
            "</span>" +
            '<button class="danger" data-action="delete" data-id="' +
            t.id +
            '">ลบ</button>' +
            "</li>"
          );
        })
        .join("");

      const activeCount = todos.filter(function (t) {
        return !t.done;
      }).length;
      countText.textContent = activeCount + " งานค้าง";
      empty.style.display = data.length ? "none" : "block";
    }

    function addTodo() {
      const title = titleInput.value.trim();
      if (!title) return;
      todos.unshift({
        id: crypto.randomUUID(),
        title: title,
        type: typeInput.value,
        deadline: deadlineInput.value || "",
        done: false,
      });
      titleInput.value = "";
      deadlineInput.value = "";
      titleInput.focus();
      render();
    }

    addBtn.addEventListener("click", addTodo);
    titleInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") addTodo();
    });

    list.addEventListener("click", function (e) {
      const action = e.target.dataset.action;
      const id = e.target.dataset.id;
      if (!action || !id) return;

      if (action === "toggle") {
        todos = todos.map(function (t) {
          if (t.id === id) return { ...t, done: !t.done };
          return t;
        });
      }
      if (action === "delete") {
        todos = todos.filter(function (t) {
          return t.id !== id;
        });
      }
      render();
    });

    tabButtons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        tabButtons.forEach(function (b) {
          b.classList.remove("active");
        });
        btn.classList.add("active");
        selectedTab = btn.dataset.tab;
        render();
      });
    });

    filterButtons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        filterButtons.forEach(function (b) {
          b.classList.remove("active");
        });
        btn.classList.add("active");
        selectedFilter = btn.dataset.filter;
        render();
      });
    });

    todos = [
      {
        id: crypto.randomUUID(),
        title: "ส่งรายงานสรุป Q2",
        type: "work",
        deadline: "2026-04-28",
        done: false,
      },
      {
        id: crypto.randomUUID(),
        title: "จองตั๋วเที่ยว",
        type: "private",
        deadline: "2026-05-03",
        done: false,
      },
      {
        id: crypto.randomUUID(),
        title: "ปิด sprint backlog",
        type: "work",
        deadline: "2026-04-20",
        done: true,
      },
    ];
    render();
  </script>
</body>
</html>
